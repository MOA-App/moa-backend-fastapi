services:
  db:
    image: postgres:16
    container_name: moa_postgres
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: moa_api
    restart: always

    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    command: >
      sh -c "
      echo '⏳ Aguardando PostgreSQL...' &&
      until pg_isready -h $$DB_HOST -p $$DB_PORT -U $$POSTGRES_USER; do sleep 2; done &&
      echo '📦 Aplicando migrações do banco de dados...' &&
      alembic upgrade head &&
      echo '🚀 Iniciando API...' &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

volumes:
  postgres_data:
