# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# opcional: manter seu template custom (se você usa)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path
prepend_sys_path = .

# manter false
revision_environment = false

sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/moa_db


[post_write_hooks]
# (pode deixar vazio por enquanto)


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
